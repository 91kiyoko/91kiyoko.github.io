<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Miku 空间</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            /* 初音经典的青绿色渐变背景 */
            background: linear-gradient(135deg, #39c5bb 0%, #003366 100%); 
            color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 15px;
            backdrop-filter: blur(10px); /* 毛玻璃特效 */
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 0 0 10px #39c5bb; }
        p { font-size: 1.2em; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 39! Miku Space</h1>
        <p>欢迎来到我的初音未来专属数字空间！</p>
        <p>把世界唱给你听~</p>
    </div>
</body>
</html>
