<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku Cyber Space | 91kiyoko</title>
    <!-- 引入字体与图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==================== 核心 CSS 变量 ==================== */
        :root {
            --primary: #00f3ff; 
            --secondary: #bc13fe; 
            --bg-dark: #050b14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ==================== 动态背景 Canvas ==================== */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a2a3a 0%, #050b14 100%);
        }

        /* ==================== 布局容器 ==================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ==================== 头部导航 ==================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .status-badge {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* ==================== Hero 区域 ==================== */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
            padding: 50px 0;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
            padding-right: 50px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typewriter {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 30px;
            border-left: 3px solid var(--primary);
            padding-left: 15px;
            min-height: 1.5em;
        }

        .cta-buttons { display: flex; gap: 20px; }

        .btn {
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        .btn-outline:hover {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        .hero-card {
            flex: 1;
            min-width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            animation: float 6s ease-in-out infinite;
        }

        .hero-card img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ==================== 音乐播放器组件 ==================== */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 300px;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s;
        }

        .music-player:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .album-art {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: url('miku.png.webp') center/cover;
            animation: spin 10s linear infinite;
            animation-play-state: paused;
            border: 2px solid var(--primary);
        }

        .music-info { flex: 1; overflow: hidden; }
        .song-title { font-size: 0.9rem; font-weight: bold; white-space: nowrap; color: var(--primary); }
        .artist { font-size: 0.7rem; color: var(--text-sub); }

        .controls i {
            cursor: pointer;
            color: #fff;
            margin-left: 10px;
            transition: color 0.2s;
        }
        .controls i:hover { color: var(--primary); }

        .visualizer { display: flex; align-items: flex-end; gap: 2px; height: 20px; margin-top: 5px; }
        .bar { width: 3px; background: var(--secondary); animation: equalize 1s infinite; }

        /* ==================== 画廊区域 ==================== */
        .gallery-section { margin-top: 50px; margin-bottom: 100px; }

        .section-title {
            font-family: 'Orbitron';
            font-size: 2rem;
            margin-bottom: 30px;
            border-left: 5px solid var(--secondary);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 243, 255, 0.2);
            border-color: var(--primary);
        }

        .card img {
            width: 100%; height: 200px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card:hover img { transform: scale(1.1); }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .card-desc { font-size: 0.8rem; color: var(--text-sub); }

        /* ==================== 动画关键帧 ==================== */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @keyframes equalize {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero { flex-direction: column-reverse; text-align: center; }
            .hero-text { padding-right: 0; margin-top: 30px; }
            .typewriter { border-left: none; border-bottom: 3px solid var(--primary); padding-bottom: 10px; padding-left: 0; }
            .cta-buttons { justify-content: center; }
            .music-player { width: 90%; right: 5%; bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- 动态背景 Canvas -->
    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo"><i class="fas fa-cube"></i> MIKU.SPACE</div>
            <div class="status-badge">
                <div class="status-dot"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <!-- 首屏 Hero -->
        <section class="hero">
            <div class="hero-text">
                <h1>CYBER<br>DIVA 39</h1>
                <div class="typewriter" id="typing-text"></div>
                <div class="cta-buttons">
                    <button class="btn btn-primary" onclick="toggleMusic()">
                        <i class="fas fa-play"></i> START ENGINE
                    </button>
                    <button class="btn btn-outline">
                        <i class="fas fa-database"></i> DATA ARCHIVE
                    </button>
                </div>
            </div>

            <div class="hero-card">
                <img src="miku.png.webp" alt="Miku Main Visual">
                <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--primary); font-family: 'Orbitron'">ID: 91KIYOKO</span>
                    <i class="fas fa-wifi" style="color: var(--text-sub)"></i>
                </div>
            </div>
        </section>

        <!-- 画廊区域 -->
        <section class="gallery-section">
            <h2 class="section-title">VISUAL MEMORY BANK</h2>
            <div class="grid">
                <div class="card">
                    <img src="miku1.jpg" alt="Memory 01">
                    <div class="card-body">
                        <h3 class="card-title">Project Diva</h3>
                        <p class="card-desc">Initial connection established.</p>
                    </div>
                </div>
                <div class="card">
                    <img src="miku3.jpg" alt="Memory 02">
                    <div class="card-body">
                        <h3 class="card-title">Digital Heart</h3>
                        <p class="card-desc">Processing emotional data...</p>
                    </div>
                </div>
                <div class="card">
                    <img src="miku4.jpg" alt="Memory 03">
                    <div class="card-body">
                        <h3 class="card-title">Future Sound</h3>
                        <p class="card-desc">Audio synthesis complete.</p>
                    </div>
                </div>
                <!-- 额外数据卡片 -->
                <div class="card" style="display: flex; align-items: center; justify-content: center; background: rgba(0, 243, 255, 0.05); border-style: dashed;">
                    <div style="text-align: center;">
                        <i class="fas fa-plus-circle" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></i>
                        <p style="color: var(--primary); font-family: 'Orbitron';">EXPAND MEMORY</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 悬浮音乐播放器 -->
    <div class="music-player">
        <div class="album-art" id="albumArt"></div>
        <div class="music-info">
            <div class="song-title">妄想感傷代償連盟</div>
            <div class="artist">DECO*27 / 初音ミク</div>
            <div class="visualizer">
                <div class="bar" style="animation-delay: 0.1s;"></div>
                <div class="bar" style="animation-delay: 0.3s;"></div>
                <div class="bar" style="animation-delay: 0.5s;"></div>
                <div class="bar" style="animation-delay: 0.2s;"></div>
                <div class="bar" style="animation-delay: 0.4s;"></div>
            </div>
        </div>
        <div class="controls">
            <i class="fas fa-play" id="playIcon" onclick="toggleMusic()"></i>
        </div>
    </div>

    <!-- 隐藏的音频元素 -->
    <audio id="bgm" loop>
        <source src="妄想感伤代偿联盟.mp3" type="audio/mpeg">
    </audio>

    <!-- 核心脚本逻辑 -->
    <script>
        /* ==================== 1. Canvas 动态粒子背景 ==================== */
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(0, 243, 255, ${0.2 * (1 - distance / 100)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            connectParticles();
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

                /* ==================== 2. 打字机特效 ==================== */
        const textElement = document.getElementById('typing-text');
        const texts = [
            "Welcome to the miku World!",
            "Loading Miku Modules...",
            "Connecting to Vocaloid Database...",
            "Ready to Dance."
        ];
        let textIndex = 0, charIndex = 0, isDeleting = false;

        function typeEffect() {
            const currentText = texts[textIndex];
            if (isDeleting) {
                textElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentText.length) {
                typeSpeed = 2000; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                typeSpeed = 500;
            }
            setTimeout(typeEffect, typeSpeed);
        }
        typeEffect();

        /* ==================== 3. 音乐播放控制 ==================== */
        const bgm = document.getElementById('bgm');
        const playIcon = document.getElementById('playIcon');
        const albumArt = document.getElementById('albumArt');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                bgm.pause();
                playIcon.className = 'fas fa-play';
                albumArt.style.animationPlayState = 'paused';
            } else {
                bgm.play().catch(e => console.log("Autoplay blocked, click to play."));
                playIcon.className = 'fas fa-pause';
                albumArt.style.animationPlayState = 'running';
            }
            isPlaying = !isPlaying;
        }

        /* ==================== 4. Live2D 看板娘加载 ==================== */
        // 动态加载 L2Dwidget 脚本
        const l2dScript = document.createElement('script');
        l2dScript.src = 'https://cdn.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js';
        l2dScript.onload = function() {
            // 等待 autoload.js 加载完成后，进行自定义配置
            // 注意：autoload.js 会自动初始化，这里我们通过全局变量覆盖配置
            if (window.initWidget) {
                // 如果 autoload 没有自动初始化，我们可以手动调用
                // 但通常 autoload 会自动处理，我们通过修改默认配置来增强功能
            }
        };
        document.head.appendChild(l2dScript);

        // 自定义 Live2D 配置 (覆盖默认设置)
        // 这些配置会在 autoload.js 执行后生效
        window.live2d_settings = {
            model: {
                // 内置多个模型，随机加载或指定加载
                // 这里使用经典的 shizuku 模型，稳定且兼容性好
                jsonPath: "https://cdn.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/assets/shizuku/shizuku.model.json",
                scale: 1,
                hHeadPos: 0.5,
                vHeadPos: 0.618,
                hBodyPos: 0.5,
                vBodyPos: 0.618,
            },
            display: {
                position: "right", // left / right
                width: 280,
                height: 250,
                hOffset: 10,
                vOffset: -20,
            },
            mobile: {
                show: true, // 移动端也显示
                scale: 0.8,
            },
            react: {
                opacityDefault: 0.9,
                opacityOnHover: 1,
            },
            // 自定义提示语
            tips: {
                mouseover: [
                    { selector: ".logo", text: "点击返回首页~" },
                    { selector: ".btn-primary", text: "要开始播放音乐了吗？" },
                    { selector: ".card", text: "这张图很有感觉呢！" },
                    { selector: "#canvas-bg", text: "背景粒子在跳舞哦~" }
                ],
                click: [
                    { selector: ".hero-card img", text: "不要乱摸啦！(*/ω＼*)" },
                    { selector: ".status-badge", text: "系统运行正常，请放心~" }
                ],
                seasonal: true, // 节日提示
                copy: true      // 复制提示
            }
        };

        /* ==================== 5. 画廊卡片入场动画 ==================== */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.6s ease-out';
            observer.observe(card);
        });

        /* ==================== 6. 控制台彩蛋 ==================== */
        console.log(
            "%c MIKU CYBER SPACE %c 91kiyoko ",
            "background: #00f3ff; color: #000; font-size: 14px; padding: 5px 10px; border-radius: 4px 0 0 4px;",
            "background: #bc13fe; color: #fff; font-size: 14px; padding: 5px 10px; border-radius: 0 4px 4px 0;"
        );
        console.log("🎵 BGM: 妄想感傷代償連盟 - DECO*27");
        console.log("🤖 Live2D Model: Shizuku (Custom Config)");
