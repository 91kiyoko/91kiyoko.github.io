<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku Cyber Space | 91kiyoko</title>
    <style>
        :root { --miku-green: #39c5bb; --miku-dark: #0a192f; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--miku-dark); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; cursor: none; }

        /* 1. 全屏粒子背景 */
        #cyber-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 2. 鼠标追踪光效 */
        .cursor-glow { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(57,197,187,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 1; transition: opacity 0.3s; }

        /* 3. 多区块滚动容器 */
        .scroll-container { position: relative; z-index: 2; scroll-behavior: smooth; }
        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px 20px; position: relative; }

        /* 4. 玻璃拟态卡片 */
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; max-width: 600px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); animation: floatUp 1s ease-out forwards; opacity: 0; transform: translateY(30px); }
        .glass-card.visible { opacity: 1; transform: translateY(0); }

        /* 5. 头像与文字特效 */
        .miku-avatar { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--miku-green); box-shadow: 0 0 20px rgba(57, 197, 187, 0.4); margin-bottom: 20px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .miku-avatar:hover { transform: scale(1.1) rotate(5deg); }
        h1 { font-size: 2.5rem; color: var(--miku-green); margin-bottom: 10px; text-shadow: 0 0 10px rgba(57, 197, 187, 0.5); }
        .typewriter { font-size: 1.2rem; color: #a0a0a0; min-height: 1.5em; }

        /* 6. 按钮样式 */
        .btn-link { display: inline-block; padding: 12px 30px; background: var(--miku-green); color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-link:hover { box-shadow: 0 0 20px var(--miku-green); transform: translateY(-2px); }

        /* 7. 音乐播放器样式 */
        .music-player { margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .music-btn { background: none; border: 1px solid var(--miku-green); color: var(--miku-green); padding: 6px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .music-btn:hover { background: var(--miku-green); color: #000; }
        .music-title { font-size: 12px; color: #888; }

        /* 8. 右侧导航点 */
        .nav-dots { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 10; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; }
        .dot.active, .dot:hover { background: var(--miku-green); box-shadow: 0 0 10px var(--miku-green); transform: scale(1.3); }

        /* 9. 看板娘预留位置 */
        #live2d-container { position: fixed; bottom: 0; right: 0; width: 300px; height: 400px; z-index: 999; pointer-events: none; }

        @keyframes floatUp { to { opacity: 1; transform: translateY(0); } }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .glass-card { padding: 30px 20px; }
            .nav-dots { display: none; }
            body { cursor: auto; }
            .cursor-glow { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="cyber-canvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="nav-dots" id="navDots">
        <div class="dot active" data-target="home"></div>
        <div class="dot" data-target="about"></div>
        <div class="dot" data-target="contact"></div>
    </nav>

    <div id="live2d-container"></div>

    <main class="scroll-container">
        <!-- 第一屏：首页 -->
        <section id="home">
            <div class="glass-card">
                <img src="miku.png" alt="Miku" class="miku-avatar" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/e/e3/Hatsune_Miku_V4X.png'">
                <h1>91kiyoko</h1>
                <div class="typewriter" id="typeText"></div>
                
                <!-- 🎵 音乐播放器 -->
                <div class="music-player">
                    <button class="music-btn" id="playBtn">▶ Play</button>
                    <span class="music-title">♪ 妄想感傷代償聯盟-DECO*27(livetune)</span>
                </div>
                <audio id="bgMusic" loop preload="auto">
                    <source src="妄想感伤代偿联盟.mp3" type="audio/mpeg">
                </audio>
            </div>
        </section>

        <!-- 第二屏：关于 -->
        <section id="about">
            <div class="glass-card">
                <h1>System Info</h1>
                <p style="line-height:1.8; color:#ccc; margin-top:15px;">
                    这是一个由代码与音符构建的次元空间。<br>
                    在这里，数据流化作旋律，<br>
                    每一次点击都是与未来的共鸣。
                </p>
                <a href="gallery.html" class="btn-link">进入画廊 Gallery</a>
            </div>
        </section>

        <!-- 第三屏：联系 -->
        <section id="contact">
            <div class="glass-card">
                <h1>Connect</h1>
                <p style="margin:20px 0; color:#aaa;">准备建立神经连接...</p>
                <a href="#" class="btn-link">Start Link</a>
            </div>
        </section>
    </main>

    <script>
        // --- 1. 粒子风暴系统 ---
        const canvas = document.getElementById('cyber-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * w; this.y = Math.random() * h; this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5; this.size = Math.random() * 2; }
            update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset(); }
            draw() { ctx.fillStyle = '#39c5bb'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 120; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.strokeStyle = `rgba(57, 197, 187, ${1 - dist / 120})`; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- 2. 鼠标光效追踪 ---
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });

        // --- 3. 打字机特效 ---
        const text = "Welcome to the Cyber World. 39!";
        const typeEl = document.getElementById('typeText');
        let idx = 0;
        function typeWriter() { if (idx < text.length) { typeEl.textContent += text.charAt(idx); idx++; setTimeout(typeWriter, 80); } }
        setTimeout(typeWriter, 800);

        // --- 4. 音乐播放控制 ---
        const bgMusic = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            if (bgMusic.paused) { bgMusic.play(); playBtn.textContent = '⏸ Pause'; }
            else { bgMusic.pause(); playBtn.textContent = '▶ Play'; }
        });

        // --- 5. 滚动监听与卡片入场 ---
        const cards = document.querySelectorAll('.glass-card');
        const dots = document.querySelectorAll('.dot');
        const sections = document.querySelectorAll('section');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    const id = entry.target.id;
                    dots.forEach(d => d.classList.remove('active'));
                    document.querySelector(`.dot[data-target="${id}"]`)?.classList.add('active');
                }
            });
        }, { threshold: 0.5 });
        cards.forEach(card => observer.observe(card));
        sections.forEach(sec => observer.observe(sec));
        dots.forEach(dot => { dot.addEventListener('click', () => { document.getElementById(dot.dataset.target)?.scrollIntoView({ behavior: 'smooth' }); }); });
    </script>
</body>
</html>
