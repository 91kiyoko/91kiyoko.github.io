<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku Cyber Space | 91kiyoko</title>
    <!-- 引入 Google Fonts 增加科技感字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* --- 核心变量定义 --- */
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #000;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- 1. 动态渐变背景特效 --- */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(-45deg, #0b0f19, #1a0b2e, #002b36, #0d0d0d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 叠加一层噪点纹理，增加胶片感 */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- 2. 布局容器 --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 3. 头部与标题 --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-pink));
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        /* --- 4. 玻璃拟态卡片 (主要内容区) --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.3);
        }

        /* 主视觉图样式 */
        .hero-image-container {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 5s ease;
        }

        .glass-card:hover .hero-image {
            transform: scale(1.05);
        }

        /* --- 5. 音乐播放器组件 --- */
        .music-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .disk-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: conic-gradient(var(--neon-pink), var(--neon-blue), var(--neon-pink));
            animation: spin 3s linear infinite;
            animation-play-state: paused; /* 默认暂停 */
        }

        .song-text h3 { font-size: 1rem; margin-bottom: 2px; }
        .song-text p { font-size: 0.8rem; color: #aaa; }

        .controls button {
            background: none;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* --- 6. 画廊网格 --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin-top: 2rem;
        }

        .gallery-item {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            animation: fadeInUp 1s ease-out backwards;
        }

        /* 延迟动画 */
        .gallery-item:nth-child(1) { animation-delay: 0.5s; }
        .gallery-item:nth-child(2) { animation-delay: 0.6s; }
        .gallery-item:nth-child(3) { animation-delay: 0.7s; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .gallery-overlay { opacity: 1; }

        /* --- 动画关键帧 --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .glass-card { padding: 1.5rem; }
            .hero-image-container { height: 250px; }
        }
    </style>
</head>
<body>

    <!-- 背景层 -->
    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>

    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>MIKU CYBER SPACE</h1>
            <p class="subtitle">Kiyokoのmiku小屋</p>
        </header>

        <!-- 主卡片 -->
        <div class="glass-card">
            <!-- 主图展示 -->
            <div class="hero-image-container">
                <!-- 注意：这里使用了 miku.png.webp -->
                <img src="miku.png.webp" alt="Miku Main Visual" class="hero-image" onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found'">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <h2 style="font-family: 'Orbitron'; margin-bottom: 0.5rem; color: var(--neon-blue);">Project Diva: Rebirth</h2>
                <p style="line-height: 1.6; color: #ccc;">
                    世界第一的公主殿下～。
                </p>
            </div>

            <!-- 音乐播放器 -->
            <div class="music-player">
                <div class="song-info">
                    <div class="disk-icon" id="diskIcon"></div>
                    <div class="song-text">
                        <h3>妄想感傷代償連盟</h3>
                        <p>DECO*27 / 初音ミク</p>
                    </div>
                </div>
                <div class="controls">
                    <button id="playBtn">▶</button>
                </div>
                <!-- 隐藏的音频标签 -->
                <audio id="bgMusic" loop>
                    <source src="妄想感伤代偿联盟.mp3" type="audio/mpeg">
                    您的浏览器不支持 audio 元素。
                </audio>
            </div>
        </div>

        <!-- 底部画廊 -->
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="miku1.jpg" alt="Gallery 1" onerror="this.style.display='none'">
                <div class="gallery-overlay"><span>Memory 01</span></div>
            </div>
            <div class="gallery-item">
                <img src="miku3.jpg" alt="Gallery 2" onerror="this.style.display='none'">
                <div class="gallery-overlay"><span>Memory 02</span></div>
            </div>
            <div class="gallery-item">
                <img src="miku4.jpg" alt="Gallery 3" onerror="this.style.display='none'">
                <div class="gallery-overlay"><span>Memory 03</span></div>
            </div>
        </div>
    </div>

    <script>
        // --- 音乐播放逻辑 ---
        const playBtn = document.getElementById('playBtn');
        const audio = document.getElementById('bgMusic');
        const diskIcon = document.getElementById('diskIcon');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerText = "▶";
                diskIcon.style.animationPlayState = 'paused';
            } else {
                // 尝试播放
                audio.play().then(() => {
                    playBtn.innerText = "❚❚";
                    diskIcon.style.animationPlayState = 'running';
                }).catch(error => {
                    console.log("播放被阻止，需要用户交互:", error);
                    alert("请点击页面任意位置以允许播放音乐");
                });
            }
            isPlaying = !isPlaying;
        });

        // 监听音频结束（虽然设置了loop，但以防万一）
        audio.onended = function() {
            isPlaying = false;
            playBtn.innerText = "▶";
            diskIcon.style.animationPlayState = 'paused';
        };

        // --- 简单的鼠标视差效果 (让背景动起来) ---
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            // 移动背景梯度位置，产生微妙的互动感
            const bg = document.querySelector('.bg-gradient');
            bg.style.transform = `translate(-${x * 20}px, -${y * 20}px)`;
        });
    </script>
</body>
</html>
