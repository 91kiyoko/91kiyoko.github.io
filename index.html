<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miku Cyber Space | 91kiyoko</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f3ff; 
            --secondary: #bc13fe; 
            --bg-dark: #050b14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 优化背景：多层渐变 + 网格 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: 
                linear-gradient(rgba(5, 11, 20, 0.8), rgba(5, 11, 20, 0.4)),
                radial-gradient(ellipse at 20% 80%, rgba(188, 19, 254, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at center, #1a2a3a 0%, #050b14 100%);
        }

        /* 添加网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .status-badge {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
            padding: 50px 0;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
            padding-right: 50px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typewriter {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 30px;
            border-left: 3px solid var(--primary);
            padding-left: 15px;
            min-height: 1.5em;
        }

        .cta-buttons { display: flex; gap: 20px; }

        .btn {
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        .btn-outline:hover {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        .hero-card {
            flex: 1;
            min-width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            animation: float 6s ease-in-out infinite;
        }

        .hero-card img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 音乐播放器：改为底部通栏，避免遮挡 */
        .music-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px;
            z-index: 100;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .album-art {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: url('miku.png.webp') center/cover;
            animation: spin 10s linear infinite;
            animation-play-state: paused;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        .music-info { 
            flex: 1; 
            overflow: hidden;
            min-width: 0;
        }
        .song-title { 
            font-size: 0.9rem; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--primary); 
        }
        .artist { 
            font-size: 0.7rem; 
            color: var(--text-sub); 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls i {
            cursor: pointer;
            color: #fff;
            margin-left: 15px;
            transition: color 0.2s;
            font-size: 1.2rem;
        }
        .controls i:hover { color: var(--primary); }

        .visualizer { 
            display: flex; 
            align-items: flex-end; 
            gap: 3px; 
            height: 25px;
        }
        .bar { 
            width: 4px; 
            background: var(--secondary); 
            animation: equalize 1s infinite;
            border-radius: 2px;
        }

        .gallery-section { 
            margin-top: 50px; 
            margin-bottom: 120px; 
        }

        .section-title {
            font-family: 'Orbitron';
            font-size: 2rem;
            margin-bottom: 30px;
            border-left: 5px solid var(--secondary);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 243, 255, 0.2);
            border-color: var(--primary);
        }

        .card img {
            width: 100%; height: 200px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card:hover img { transform: scale(1.1); }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .card-desc { font-size: 0.8rem; color: var(--text-sub); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @keyframes equalize {
            0%, 100% { height: 5px; }
            50% { height: 25px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero { 
                flex-direction: column-reverse; 
                text-align: center; 
                min-height: auto;
                padding: 30px 0;
            }
            .hero-text { 
                padding-right: 0; 
                margin-top: 30px; 
            }
            .typewriter { 
                border-left: none; 
                border-bottom: 3px solid var(--primary); 
                padding-bottom: 10px; 
                padding-left: 0; 
            }
            .cta-buttons { 
                justify-content: center; 
                flex-wrap: wrap;
            }
            
            /* 音乐播放器移动端优化 */
            .music-player {
                padding: 10px 15px;
            }
            .album-art {
                width: 40px; height: 40px;
            }
            .visualizer {
                display: none;
            }
            .controls i {
                margin-left: 10px;
                font-size: 1rem;
            }
            
            /* 画廊底部留更多空间 */
            .gallery-section {
                margin-bottom: 100px;
            }
            
            /* 卡片全宽 */
            .grid {
                grid-template-columns: 1fr;
            }
            
            /* 看板娘位置调整 */
            #waifu {
                transform: scale(0.7) !important;
                right: -40px !important;
                bottom: 70px !important;
            }
        }

        /* 超小屏幕 */
        @media (max-width: 380px) {
            .logo {
                font-size: 1.2rem;
            }
            .status-badge {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            h1 {
                font-size: 2rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="grid-overlay"></div>

    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-cube"></i> MIKU.SPACE</div>
            <div class="status-badge">
                <div class="status-dot"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <section class="hero">
            <div class="hero-text">
                <h1>CYBER<br>DIVA 39</h1>
                <div class="typewriter" id="typing-text"></div>
                <div class="cta-buttons">
                    <button class="btn btn-primary" onclick="toggleMusic()">
                        <i class="fas fa-play"></i> START ENGINE
                    </button>
                    <button class="btn btn-outline">
                        <i class="fas fa-database"></i> DATA ARCHIVE
                    </button>
                </div>
            </div>

            <div class="hero-card">
                <img src="miku.png.webp" alt="Miku Main Visual">
                <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--primary); font-family: 'Orbitron'">ID: 91KIYOKO</span>
                    <i class="fas fa-wifi" style="color: var(--text-sub)"></i>
                </div>
            </div>
        </section>

        <section class="gallery-section">
            <h2 class="section-title">VISUAL MEMORY BANK</h2>
            <div class="grid">
                <div class="card">
                    <img src="miku1.jpg" alt="Memory 01">
                    <div class="card-body">
                        <h3 class="card-title">Project Diva</h3>
                        <p class="card-desc">Initial connection established.</p>
                    </div>
                </div>
                <div class="card">
                    <img src="miku3.jpg" alt="Memory 02">
                    <div class="card-body">
                        <h3 class="card-title">Digital Heart</h3>
                        <p class="card-desc">Processing emotional data...</p>
                    </div>
                </div>
                <div class="card">
                    <img src="miku4.jpg" alt="Memory 03">
                    <div class="card-body">
                        <h3 class="card-title">Future Sound</h3>
                        <p class="card-desc">Audio synthesis complete.</p>
                    </div>
                </div>
                <div class="card" style="display: flex; align-items: center; justify-content: center; background: rgba(0, 243, 255, 0.05); border-style: dashed;">
                    <div style="text-align: center;">
                        <i class="fas fa-plus-circle" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></i>
                        <p style="color: var(--primary); font-family: 'Orbitron';">EXPAND MEMORY</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="music-player">
        <div class="album-art" id="albumArt"></div>
        <div class="music-info">
            <div class="song-title">妄想感傷代償連盟</div>
            <div class="artist">DECO*27 / 初音ミク</div>
            <div class="visualizer">
                <div class="bar" style="animation-delay: 0.1s;"></div>
                <div class="bar" style="animation-delay: 0.3s;"></div>
                <div class="bar" style="animation-delay: 0.5s;"></div>
                <div class="bar" style="animation-delay: 0.2s;"></div>
                <div class="bar" style="animation-delay: 0.4s;"></div>
            </div>
        </div>
        <div class="controls">
            <i class="fas fa-play" id="playIcon" onclick="toggleMusic()"></i>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="妄想感伤代偿联盟.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(0, 243, 255, ${0.2 * (1 - distance / 100)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            connectParticles();
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        const textElement = document.getElementById('typing-text');
        const texts = [
            "Welcome to the Cyber World. 39!",
            "Loading Miku Modules...",
            "Connecting to Vocaloid Database...",
            "Ready to Dance."
        ];
        let textIndex = 0, charIndex = 0, isDeleting = false;

        function typeEffect() {
            const currentText = texts[textIndex];
            if (isDeleting) {
                textElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentText.length) {
                typeSpeed = 2000; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                typeSpeed = 500;
            }
            setTimeout(typeEffect, typeSpeed);
        }
        typeEffect();

        const bgm = document.getElementById('bgm');
        const playIcon = document.getElementById('playIcon');
        const albumArt = document.getElementById('albumArt');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                bgm.pause();
                playIcon.className = 'fas fa-play';
                albumArt.style.animationPlayState = 'paused';
            } else {
                bgm.play().catch(e => console.log("Autoplay blocked, click to play."));
                playIcon.className = 'fas fa-pause';
                albumArt.style.animationPlayState = 'running';
            }
            isPlaying = !isPlaying;
        }

        const l2dScript = document.createElement('script');
        l2dScript.src = 'https://fastly.jsdelivr.net/npm/live2d-widgets@1.0.1/dist/autoload.js';
        document.head.appendChild(l2dScript);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.6s ease-out';
            observer.observe(card);
        });

        console.log(
            "%c MIKU CYBER SPACE %c 91kiyoko ",
            "background: #00f3ff; color: #000; font-size: 14px; padding: 5px 10px; border-radius: 4px 0 0 4px;",
            "background: #bc13fe; color: #fff; font-size: 14px; padding: 5px 10px; border-radius: 0 4px 4px 0;"
        );
        console.log("🎵 BGM: 妄想感傷代償連盟 - DECO*27");
        console.log("🤖 Live2D Model: Shizuku (Custom Config)");
    </script>
</body>
</html>
